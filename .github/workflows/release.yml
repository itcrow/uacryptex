name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write   # PyPI trusted publishing (when enabled)

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            goos: darwin
            goarch: amd64
            target: x86_64-apple-darwin
          - os: macos-latest
            goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            goos: windows
            goarch: amd64
            target: x86_64-pc-windows-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross target (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu
      - name: Add MinGW to PATH (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: echo "/c/mingw64/bin" >> "$GITHUB_PATH"
      - name: Verify version sync
        run: ./scripts/verify-version.sh
      - name: Build native library
        shell: bash
        run: ./scripts/build-ffi.sh ${{ matrix.goos }} ${{ matrix.goarch }}
      - name: Package native library
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/package-native-lib.sh "$VERSION" "${{ matrix.goos }}" "${{ matrix.goarch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            native/lib/${{ matrix.goos }}/${{ matrix.goarch }}/
            dist/uacryptex-native-*.tar.gz

  merge-bindings:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts
          merge-multiple: false
      - name: Merge into native/lib
        run: ./scripts/merge-native-artifacts.sh artifacts
      - name: Package binding bundles
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          tar czf "dist/uacryptex-bindings-go-${VERSION}.tar.gz" -C go native/lib
          tar czf "dist/uacryptex-bindings-python-${VERSION}.tar.gz" -C python/uacryptex native/lib
          tar czf "dist/uacryptex-bindings-php-${VERSION}.tar.gz" -C php native/lib
          tar czf "dist/uacryptex-bindings-nodejs-${VERSION}.tar.gz" -C nodejs native/lib
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/
            go/native/lib/
            python/uacryptex/native/lib/
            php/native/lib/
            nodejs/native/lib/

  release:
    needs: [build-native, merge-bindings]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist
      - name: Flatten tarball paths
        shell: bash
        run: |
          find dist -name 'uacryptex-*.tar.gz' -exec mv {} dist/ \; 2>/dev/null || true
          ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/uacryptex-*.tar.gz

