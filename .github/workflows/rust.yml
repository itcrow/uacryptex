name: Rust

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo test -p uacryptex-ffi --test ffi_pki
      - name: Test ct-scalar-mul feature
        run: |
          cargo test -p uacryptex-core --features ct-scalar-mul --test math_ec2m_kat --test dstu4145_kat
          cargo test -p uacryptex-ffi --features ct-scalar-mul --test ffi_pki
