name: Build FFI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            goos: darwin
            goarch: amd64
            target: x86_64-apple-darwin
          - os: macos-latest
            goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            goos: windows
            goarch: amd64
            target: x86_64-pc-windows-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross target (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu
      - name: Add MinGW to PATH (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: echo "/c/mingw64/bin" >> "$GITHUB_PATH"
      - name: Build FFI
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_AR: aarch64-linux-gnu-ar
        run: |
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            export PATH="/c/mingw64/bin:${PATH}"
          fi
          ./scripts/build-ffi.sh "${{ matrix.goos }}" "${{ matrix.goarch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.goos }}-${{ matrix.goarch }}
          path: native/lib/${{ matrix.goos }}/${{ matrix.goarch }}/

  merge-and-sync:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts
          merge-multiple: false
      - name: Merge platform artifacts
        run: ./scripts/merge-native-artifacts.sh artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: native-lib-all-platforms
          path: |
            native/lib/
            go/native/lib/
            python/uacryptex/native/lib/
            php/native/lib/
            nodejs/native/lib/
