name: Go

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            goos: windows
            goarch: amd64
            target: x86_64-pc-windows-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build native lib
        shell: bash
        run: |
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            export PATH="/c/mingw64/bin:${PATH}"
          fi
          ./scripts/build-ffi.sh "${{ matrix.goos }}" "${{ matrix.goarch }}"
          ls -la "native/lib/${{ matrix.goos }}/${{ matrix.goarch }}/"
      - name: Sync native libs into Go package
        shell: bash
        run: ./scripts/sync-native-libs.sh
      - name: Verify Go native lib
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          ls -la go/native/lib/windows/amd64/
          test -f go/native/lib/windows/amd64/libuacryptex_ffi.a
          test -f go/uacryptex/internal/native/libuacryptex_ffi.a
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test Go binding
        working-directory: go
        env:
          CGO_ENABLED: "1"
        run: go test -v ./...
      - name: Python binding smoke test
        if: matrix.os == 'ubuntu-latest'
        run: make python-test
