name: uacryptex
description: Ukrainian cryptography (DSTU/GOST PKI) for Dart and Flutter via uacryptex Rust core.
version: 0.1.0
repository: https://github.com/your-org/uacryptex
publish_to: none

environment:
  sdk: ^3.3.0

dependencies:
  ffi: ^2.1.3

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.uacryptex.uacryptex
        pluginClass: UacryptexPlugin
      ios:
        pluginClass: UacryptexPlugin
